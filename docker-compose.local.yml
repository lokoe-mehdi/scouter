services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    command: postgres -c max_locks_per_transaction=256
    environment:
      - POSTGRES_DB=scouter
      - POSTGRES_USER=scouter
      - POSTGRES_PASSWORD=scouter
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - scouter-net

  # ClickHouse — entrepôt des données de crawl (pages/links/html + post-proc).
  # PostgreSQL garde la frontier + les métadonnées. Voir clickhouse.md.
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"  # HTTP interface (lectures rapports + writes crawler)
      - "9000:9000"  # native (debug local via clickhouse-client)
    environment:
      - CLICKHOUSE_DB=scouter
      - CLICKHOUSE_USER=scouter
      - CLICKHOUSE_PASSWORD=scouter
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - scouter-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Application PHP principale
  scouter:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./web:/app/web
      - ./app:/app/app
      - ./crawls:/var/www/crawls
      - ./logs:/app/logs
    environment:
      - PHP_CLI_SERVER_WORKERS=8
      - RENDERER_URL=http://renderer-1:3000,http://renderer-2:3000,http://renderer-3:3000
      - DATABASE_URL=postgresql://scouter:scouter@postgres:5432/scouter
      # ClickHouse (entrepôt données de crawl). Vide = lectures sur PG (ancien comportement).
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=scouter
      - CLICKHOUSE_USER=scouter
      - CLICKHOUSE_PASSWORD=scouter
      # Master key used to encrypt secrets stored in app_settings (Gemini API key, etc.).
      # Local dev value — DO NOT reuse for production. Generate one with `openssl rand -hex 32`.
      - SCOUTER_ENCRYPTION_KEY=868ace624e48dc6da990d2512c380a9ec8b168e11c0fb4aff8393bb6a1d22809
    restart: unless-stopped
    networks:
      - scouter-net
    depends_on:
      - renderer-1
      - postgres
      - clickhouse

  # Serveur MCP (Model Context Protocol) — adaptateur au-dessus de /api/v1.
  mcp:
    build: ./mcp
    expose:
      - 3000
    environment:
      - SCOUTER_API_URL=http://scouter:8080
    restart: unless-stopped
    networks:
      - scouter-net
    depends_on:
      - scouter

  # Service Worker (Crawl)
  worker:
    build: .
    entrypoint: ["php", "app/bin/worker.php"]
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 4
    environment:
      - DATABASE_URL=postgresql://scouter:scouter@postgres:5432/scouter
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=scouter
      - CLICKHOUSE_USER=scouter
      - CLICKHOUSE_PASSWORD=scouter
      - RENDERER_URL=http://renderer-1:3000,http://renderer-2:3000,http://renderer-3:3000
      - MAX_CONCURRENT_CURL=30
      - MAX_CONCURRENT_CHROME=15
      # NB : le crawl PHP a été retiré (refacto.md §11). Le worker PHP ne prend
      # plus QUE delete / batch-categorize / bulk-ai ; les crawls sont au worker Go.
      # Worker needs the encryption key to decrypt the OpenRouter API key
      # stored in app_settings (used by the Bulk AI Generator + any future
      # background AI job). Without this, AppSettings::get('ai.openrouter.api_key')
      # returns null and jobs fail with "API key not configured".
      - SCOUTER_ENCRYPTION_KEY=868ace624e48dc6da990d2512c380a9ec8b168e11c0fb4aff8393bb6a1d22809
    volumes:
      - ./web:/app/web
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - scouter-net
    depends_on:
      - postgres
      - clickhouse
      - renderer-1

  # Go crawl worker (crawler-go) — replaces the PHP crawl path. One process,
  # multiple concurrent crawls (MAX_CONCURRENT_CRAWLS). Claims ONLY
  # command='crawl' jobs; cohabits with the PHP worker above.
  crawler-go:
    # Dev local : on NE build PAS d'image. On lance via `go run` avec le code
    # monté en volume + cache de compilation persistant. Workflow :
    #   éditer crawler-go/**.go  →  docker compose -f docker-compose.local.yml restart crawler-go
    # → recompilation en quelques secondes (cache chaud), SANS rebuild d'image.
    # (La prod, docker-compose.yml, garde le binaire compilé via le Dockerfile.)
    image: golang:1.25-alpine
    working_dir: /src
    command: go run ./cmd/scouter-crawler
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      - CGO_ENABLED=0
      - GOTOOLCHAIN=local
      - DATABASE_URL=postgresql://scouter:scouter@postgres:5432/scouter
      # ClickHouse : si défini, le crawler appende les données + fait le post-proc dans CH.
      # Vide = comportement PG-only inchangé (aucune régression).
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=scouter
      - CLICKHOUSE_USER=scouter
      - CLICKHOUSE_PASSWORD=scouter
      # Auto-migration au démarrage : backfill des anciens crawls PG -> ClickHouse.
      # Non destructif (garde PG). Idempotent (skip les crawls déjà migrés).
      - CLICKHOUSE_AUTO_MIGRATE=${CLICKHOUSE_AUTO_MIGRATE:-1}
      # Bascule COMPLÈTE (opt-in, DESTRUCTIF) : saute le post-proc PG, DROP les
      # données PG en fin de crawl, ET purge le PG des anciens crawls après le
      # backfill auto ci-dessus. Vide = off (PG gardé).
      - CLICKHOUSE_DROP_PG=${CLICKHOUSE_DROP_PG:-}
      # 3 hostnames distincts (PAS un service répliqué) : le round-robin Go +
      # ses pools de connexions séparés répartissent vraiment sur les 3. Avec un
      # seul nom DNS + keep-alive, Go se collerait à un seul replica.
      - RENDERER_URLS=http://renderer-1:3000,http://renderer-2:3000,http://renderer-3:3000
      # 4 crawls simultanés × 12 fetches parallèles = ~48 requêtes en vol.
      # Monter MAX_CONCURRENT_CURL seulement si le serveur cible encaisse (sinon
      # il rate-limite → 429/503 → retries → plus lent). Mettre crawl_speed=
      # unlimited sur le crawl (UI) pour lever le throttle.
      - MAX_CONCURRENT_CRAWLS=${MAX_CONCURRENT_CRAWLS:-4}
      - MAX_CONCURRENT_CURL=${MAX_CONCURRENT_CURL:-12}
      - POOL_CONNS_PER_CRAWL=${POOL_CONNS_PER_CRAWL:-8}
      - LOG_DIR=/app/logs
    volumes:
      - ./crawler-go:/src
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      # Shared with the scouter container so the UI live console can tail logs.
      - ./logs:/app/logs
    networks:
      - scouter-net
    depends_on:
      - postgres
      - clickhouse
      - renderer-1
      - renderer-2
      - renderer-3

  # Service de rendu JavaScript — 3 instances NOMMÉES (renderer-1/2/3) pour que
  # le round-robin du crawler Go les utilise réellement toutes les trois.
  # Tune RAM/débit par renderer via MAX_CONCURRENT_PAGES / PAGE_POOL_SIZE.
  renderer-1: &renderer-base
    build: ./renderer
    init: true
    expose:
      - 3000
    environment:
      - SCOUTER_API_URL=http://scouter:8080
      # Multi-process Chrome : 20 pages/renderer × 3 renderers = 60 rendus //.
      # Largement suffisant, et tient la RAM. Monter seulement si RAM dispo.
      - MAX_CONCURRENT_PAGES=${MAX_CONCURRENT_PAGES:-20}
      - PAGE_POOL_SIZE=${PAGE_POOL_SIZE:-20}
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
    networks:
      - scouter-net

  renderer-2:
    <<: *renderer-base
  renderer-3:
    <<: *renderer-base

networks:
  scouter-net:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  # Persistent Go caches so `go run` recompiles in seconds on restart (dev only).
  go-build-cache:
  go-mod-cache: