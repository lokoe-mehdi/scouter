server {
    listen 0.0.0.0:8080;
    server_name _;
    root /app/web;
    index index.php;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Max upload size
    client_max_body_size 100M;

    # API routes - redirect to API router
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
    }

    # OAuth 2.0 endpoints for the MCP connector (claude.ai) → web/oauth.php.
    # Prefix matches also cover the path-suffixed metadata variants some
    # clients request (…/oauth-authorization-server/mcp).
    # `^~` so these win over the "deny /\." hidden-files rule below.
    location ^~ /.well-known/oauth-authorization-server {
        try_files $uri /oauth.php?$args;
    }
    location ^~ /.well-known/oauth-protected-resource {
        try_files $uri /oauth.php?$args;
    }
    location /oauth/ {
        try_files $uri /oauth.php?$args;
    }

    # MCP server (Model Context Protocol) — proxied to the `mcp` sidecar.
    # The hostname is resolved at request time (Docker DNS) via a variable so
    # nginx still starts when the mcp container is down. Auth is pass-through.
    location /mcp {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $mcp_upstream mcp:3000;
        # Prefer upstream X-Forwarded-* (TLS terminated by an external proxy),
        # else use this server's own scheme/host.
        set $fwd_proto $http_x_forwarded_proto;
        if ($fwd_proto = '') { set $fwd_proto $scheme; }
        set $fwd_host $http_x_forwarded_host;
        if ($fwd_host = '') { set $fwd_host $http_host; }
        proxy_pass http://$mcp_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the external proxy's values when present (TLS terminated upstream),
        # otherwise fall back to what this nginx sees — so the MCP server advertises
        # the right public https URL in WWW-Authenticate.
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        # Streamable HTTP / SSE: don't buffer, allow long-lived responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeouts for long-running scripts
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
