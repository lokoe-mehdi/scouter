server {
    listen 0.0.0.0:8080;
    server_name _;
    root /app/web;
    index index.php;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Max upload size
    client_max_body_size 100M;

    # API routes - redirect to API router
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
    }

    # MCP server (Model Context Protocol) — proxied to the `mcp` sidecar.
    # The hostname is resolved at request time (Docker DNS) via a variable so
    # nginx still starts when the mcp container is down. Auth is pass-through.
    location /mcp {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $mcp_upstream mcp:3000;
        proxy_pass http://$mcp_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        # Streamable HTTP / SSE: don't buffer, allow long-lived responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeouts for long-running scripts
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
